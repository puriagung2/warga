<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Scanner KK Puri Agung 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-100 p-4">
    <div id="uploadSection" class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-md">
        <h2 class="text-xl font-bold mb-4 text-center">Scanner KK</h2>
        <input type="file" id="fileInput" accept="image/*" class="w-full mb-4">
        
        <div id="editorSection" class="hidden">
            <canvas id="canvas" class="w-full border mb-4"></canvas>
            <select id="kategoriFile" class="w-full p-2 border rounded-md mb-2">
                <option value="KK BATAM">KK BATAM</option>
                <option value="KK LUAR BATAM">KK LUAR BATAM</option>
            </select>
            <select id="rtSelector" class="w-full p-2 border rounded-md mb-2">
                <option value="RT 01">RT 01</option>
                <option value="RT 02">RT 02</option>
                <option value="RT 03">RT 03</option>
                <option value="RT 04">RT 04</option>
            </select>
            <input type="text" id="fileNameInput" placeholder="Masukkan Nomor KK" class="w-full p-2 border rounded-md mb-4">
            <button id="btn" onclick="upload()" class="w-full bg-blue-600 text-white p-2 rounded-md">Simpan ke Drive</button>
            <p id="status" class="mt-2 text-sm text-center"></p>
        </div>
    </div>
    <script src="scanscript.js"></script>
</body>
</html>
