<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner KK Puri Agung 2</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        button { background: #0084ff; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.3s; width: 100%; }
        button:disabled { background: #ccc; }
        input[type="file"] { margin: 20px 0; }
        #loader { display: none; margin-top: 15px; color: #555; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Scanner KK</h2>
        <p>Puri Agung 2 Community</p>
        <input type="file" id="fotoKK" accept="image/*" capture="environment">
        <button id="btnUpload" onclick="uploadKeGoogle()">Proses & Simpan PDF</button>
        <div id="loader">Sedang memproses OCR...</div>
    </div>

    <script>
        const WEB_APP_URL = "URL_WEB_APP_ANDA_DI_SINI"; // Ganti dengan URL exec Anda

        async function uploadKeGoogle() {
            const fileInput = document.getElementById('fotoKK');
            const btn = document.getElementById('btnUpload');
            const loader = document.getElementById('loader');

            if (fileInput.files.length === 0) return alert("Pilih foto dulu!");

            btn.disabled = true;
            loader.style.display = "block";

            const file = fileInput.files[0];
            const base64 = await toBase64(file);

            try {
                // Mengirim data ke Google Apps Script via Fetch API
                const response = await fetch(WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        image: base64,
                        fileName: file.name
                    })
                });

                const result = await response.json();
                
                if (result.status === "success") {
                    alert("✅ Berhasil! File disimpan sebagai: " + result.kk + ".pdf");
                } else {
                    alert("❌ Gagal: " + result.message);
                }
            } catch (err) {
                alert("❌ Terjadi kesalahan koneksi atau Limit API.");
            } finally {
                btn.disabled = false;
                loader.style.display = "none";
            }
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    </script>
</body>
</html>
