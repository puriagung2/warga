<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Scanner KK Lokal</title>
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .box { max-width: 400px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 10px; }
        #status { margin-top: 15px; color: #555; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Scanner KK (Lokal)</h2>
        <input type="file" id="fileInput" accept="image/*" capture="environment">
        <button id="btn" onclick="startProcess()">Scan & Simpan</button>
        <div id="status">Pilih foto dokumen...</div>
    </div>

    <script>

        // Tambahkan prefix proxy ini di depan URL Anda
const PROXY_URL = "https://cors-anywhere.herokuapp.com/"; 
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbymE6TezVMwgH9hDTyMqCWt7RX6d5dx2kE9gb-9uzfazsxQZnMRzy3Lp1hC6Ixyyzjj/exec";

// Di dalam fungsi uploadKeGoogle():
const response = await fetch(PROXY_URL + WEB_APP_URL, {
    method: "POST",
    body: JSON.stringify({ ... })
});

        async function startProcess() {
            const file = document.getElementById('fileInput').files[0];
            const status = document.getElementById('status');
            const btn = document.getElementById('btn');
            
            if (!file) return alert("Pilih foto!");

            btn.disabled = true;
            status.innerText = "Sedang membaca teks (OCR Lokal)...";

            // 1. Proses OCR Lokal dengan Tesseract
            Tesseract.recognize(file, 'ind') // 'ind' untuk bahasa Indonesia
            .then(({ data: { text } }) => {
                const kkMatch = text.match(/\d{16}/);
                const kkNumber = kkMatch ? kkMatch[0] : "KK_" + new Date().getTime();
                
                status.innerText = "Berhasil dibaca: " + kkNumber + ". Mengirim ke Drive...";

                // 2. Kirim hasil ke Google Apps Script
                const reader = new FileReader();
                reader.onload = function(e) {
                    fetch(WEB_APP_URL, {
                        method: "POST",
                        body: JSON.stringify({ image: e.target.result, fileName: kkNumber + ".jpg" })
                    })
                    .then(r => r.json())
                    .then(res => {
                        status.innerText = "✅ Selesai! Tersimpan sebagai " + kkNumber + ".pdf";
                        btn.disabled = false;
                    });
                };
                reader.readAsDataURL(file);
            });
        }
    </script>
</body>
</html>
