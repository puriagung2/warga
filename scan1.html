<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Scanner KK RW6</title>
</head>
<body class="bg-gray-100 min-h-screen p-4">

    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h3 class="text-xl font-bold text-gray-800 mb-4 text-center">Scanner KK Puri Agung 2</h3>

        <div id="uploadSection">
            <label class="block w-full text-center py-8 border-2 border-dashed border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50">
                <span class="text-gray-500">Klik untuk ambil foto KK</span>
                <input type="file" id="fileInput" accept="image/*" capture="environment" class="hidden" onchange="loadFile(this)">
            </label>
        </div>

        <div id="editorSection" class="hidden mt-4">
            <canvas id="canvas" class="w-full rounded border"></canvas>
            <div class="flex justify-center gap-2 mt-4">
                <button onclick="rotateImage()" class="bg-gray-600 text-white px-4 py-2 rounded shadow">Putar 90°</button>
                <button onclick="startOCR()" class="bg-yellow-500 text-white px-4 py-2 rounded shadow">Scan Ulang (OCR)</button>
            </div>

            <div class="mt-4">
                <label class="block text-sm font-medium text-gray-700">Pilih Kategori:</label>
                <select id="kategoriFile" class="w-full mt-1 p-2 border rounded-md">
                    <option value="KK BATAM">KK BATAM</option>
                    <option value="KK LUAR BATAM">KK LUAR BATAM</option>
                </select>
            </div>

            <div class="mt-4">
                <label class="block text-sm font-medium text-gray-700">Pilih RT:</label>
                <select id="rtSelector" class="w-full mt-1 p-2 border rounded-md">
                    <option value="RT 01">RT 01</option>
                    <option value="RT 02">RT 02</option>
                    <option value="RT 03">RT 03</option>
                    <option value="RT 04">RT 04</option>
                </select>
            </div>

            <div class="mt-4">
                <label class="block text-sm font-medium text-gray-700">Nomor KK (Verifikasi Manual):</label>
                <input type="text" id="fileNameInput" class="w-full mt-1 p-2 border rounded-md">
            </div>

            <div id="status" class="mt-4 text-center text-sm text-gray-600 font-medium"></div>

            <div class="flex gap-2 mt-4">
                <button id="btn" onclick="upload()" class="flex-1 bg-blue-600 text-white py-2 rounded shadow">Simpan ke Drive</button>
                <button onclick="location.reload()" class="bg-red-500 text-white py-2 px-4 rounded shadow">Reset</button>
            </div>
        </div>
    </div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyS4SondgG4nv2_80mFW5GvkkiwxV5ySmcByB3L2Yj2eOMJkS1I0u8hkBwP76WG5tlwlQ/exec";
    const OCR_API_KEY = "K83502824388957";

    let img = new Image();
    let rotation = 0;
    let originalFile = null;

    function resetForm() {
        document.getElementById('uploadSection').classList.remove('hidden');
        document.getElementById('editorSection').classList.add('hidden');
        document.getElementById('fileInput').value = "";
        document.getElementById('fileNameInput').value = "";
        document.getElementById('status').innerText = "";
        document.getElementById('btn').disabled = false;
        const c = document.getElementById('canvas');
        c.getContext('2d').clearRect(0, 0, c.width, c.height);
        rotation = 0;
        originalFile = null;
    }

    function loadFile(input) {
        if (!input.files || !input.files[0]) return;
        originalFile = input.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            img.onload = () => { drawImage(); startOCR(); };
            img.src = e.target.result;
            document.getElementById('uploadSection').classList.add('hidden');
            document.getElementById('editorSection').classList.remove('hidden');
        };
        reader.readAsDataURL(originalFile);
    }

    async function startOCR() {
        document.getElementById('fileNameInput').value = "";
        document.getElementById('status').innerText = "TUNGGU SEDANG BACA NO KK...";

        try {
            // Konversi canvas ke Blob (File), lalu kirim sebagai multipart/form-data
            // multipart/form-data = "simple request" → tidak ada preflight CORS
            const canvas = document.getElementById('canvas');
            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.85));

            const formData = new FormData();
            formData.append('file', blob, 'kk.jpg');       // kirim sebagai file
            formData.append('apikey', OCR_API_KEY);
            formData.append('language', 'eng');
            formData.append('OCREngine', '3');
            formData.append('isOverlayRequired', 'false');

            // Kirim langsung ke OCR.space — multipart tidak trigger preflight
            const response = await fetch('https://api.ocr.space/parse/image', {
                method: 'POST',
                body: formData
                // JANGAN tambahkan headers — biarkan browser set Content-Type multipart otomatis
            });

            const result = await response.json();
            console.log("OCR result:", result);

            if (result.IsErroredOnProcessing) {
                throw new Error(result.ErrorMessage?.[0] || "OCR error");
            }

            const text = result.ParsedResults?.[0]?.ParsedText || "";
            console.log("OCR text:", text);

            const nomorKK = extractNomorKK(text);
            document.getElementById('fileNameInput').value = nomorKK;
            document.getElementById('status').innerText = nomorKK
                ? "Pembacaan selesai. Periksa kembali nomor KK."
                : "Nomor KK tidak ditemukan, silakan masukkan manual.";

        } catch (err) {
            console.error("OCR gagal:", err);
            document.getElementById('status').innerText = "Gagal membaca, silakan masukkan manual.";
        }
    }

    function extractNomorKK(text) {
        // Prioritas 1: 16 digit setelah "No." atau "No :"
        const m1 = text.match(/No[\.\s:]+([0-9][0-9\s]{14,18}[0-9])/i);
        if (m1) {
            const cleaned = m1[1].replace(/\s/g, '');
            if (cleaned.length >= 16) return cleaned.substring(0, 16);
        }

        // Prioritas 2: 16 digit berurutan berdiri sendiri
        const m2 = text.match(/\b(\d{16})\b/);
        if (m2) return m2[1];

        // Prioritas 3: 16 digit meski tidak ada word boundary
        const m3 = text.match(/(\d{16})/);
        if (m3) return m3[1];

        // Prioritas 4: kumpulkan semua digit
        const allDigits = text.replace(/[^0-9]/g, '');
        if (allDigits.length >= 16) return allDigits.substring(0, 16);

        return "";
    }

    function drawImage() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width  = (rotation % 180 !== 0) ? img.height : img.width;
        canvas.height = (rotation % 180 !== 0) ? img.width  : img.height;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.rotate(rotation * Math.PI / 180);
        ctx.drawImage(img, -img.width / 2, -img.height / 2);
    }

    function rotateImage() { rotation = (rotation + 90) % 360; drawImage(); }

    async function upload() {
        const status   = document.getElementById('status');
        const kategori = document.getElementById('kategoriFile').value;
        const rt       = document.getElementById('rtSelector').value;
        const nomorKK  = document.getElementById('fileNameInput').value.trim();

        if (!nomorKK) {
            Swal.fire({ icon: 'warning', title: 'Oops!', text: 'Nomor KK wajib diisi!' });
            return;
        }

        const fileName = kategori + " " + nomorKK + ".pdf";
        document.getElementById('btn').disabled = true;
        status.innerText = "Mengunggah...";

        try {
            await fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    base64Data: document.getElementById('canvas').toDataURL('image/jpeg', 0.9),
                    fileName,
                    selectedRt: rt
                })
            });

            Swal.fire({ icon: 'success', title: 'Berhasil!', text: fileName + ' telah tersimpan.' })
                .then(() => resetForm());

        } catch (err) {
            console.error(err);
            Swal.fire({ icon: 'error', title: 'Gagal', text: 'Terjadi kesalahan jaringan.' });
            document.getElementById('btn').disabled = false;
        }
    }
</script>
</body>
</html>
