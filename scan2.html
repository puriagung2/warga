<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner KK RW 06</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4">

    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h3 class="text-xl font-bold text-gray-800 mb-4 text-center">Scanner KK Puri Agung 2</h3>
        
        <div id="uploadSection">
            <label class="block w-full text-center py-8 border-2 border-dashed border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50">
                <span class="text-gray-500">Klik untuk ambil foto KK</span>
                <input type="file" id="fileInput" accept="image/*" capture="environment" class="hidden" onchange="loadFile(this)">
            </label>
        </div>

        <div id="editorSection" class="hidden mt-4">
            <div class="border rounded overflow-hidden">
                <img id="imagePreview" src="" alt="Preview">
            </div>
            <button onclick="applyCrop()" class="w-full mt-4 bg-blue-600 text-white py-2 rounded shadow">Potong & Scan NIK</button>
        </div>

        <div id="finalSection" class="hidden mt-4">
            <canvas id="canvas" class="w-full rounded border mb-4"></canvas>
            
            <div class="space-y-3">
                <select id="kategoriFile" class="w-full p-2 border rounded-md">
                    <option value="KK BATAM">KK BATAM</option>
                    <option value="KK LUAR BATAM">KK LUAR BATAM</option>
                </select>
                <select id="rtSelector" class="w-full p-2 border rounded-md">
                    <option value="RT 01">RT 01</option>
                    <option value="RT 02">RT 02</option>
                    <option value="RT 03">RT 03</option>
                    <option value="RT 04">RT 04</option>
                </select>
                <input type="text" id="fileNameInput" class="w-full p-2 border rounded-md" placeholder="Nomor KK">
            </div>

            <div id="status" class="mt-4 text-center text-sm text-gray-600"></div>

            <div class="flex gap-2 mt-4">
                <button id="btn" onclick="upload()" class="flex-1 bg-green-600 text-white py-2 rounded shadow">KIRIM</button>
                <button onclick="window.location.reload()" class="bg-red-500 text-white px-4 py-2 rounded shadow">RESET</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        // GANTI DENGAN URL DEPLOYMENT TERBARU ANDA
        const GAS_URL = "ISI_URL_DEPLOYMENT_GAS_ANDA_DISINI";
        let cropper = null;

        function loadFile(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById('imagePreview');
                img.src = e.target.result;
                document.getElementById('uploadSection').classList.add('hidden');
                document.getElementById('editorSection').classList.remove('hidden');
                if(cropper) cropper.destroy();
                cropper = new Cropper(img, { aspectRatio: 1.5, viewMode: 1 });
            };
            reader.readAsDataURL(input.files[0]);
        }

        async function applyCrop() {
            const canvas = document.getElementById('canvas');
            const cropped = cropper.getCroppedCanvas({width: 1200});
            canvas.width = cropped.width;
            canvas.height = cropped.height;
            canvas.getContext('2d').drawImage(cropped, 0, 0);
            
            document.getElementById('editorSection').classList.add('hidden');
            document.getElementById('finalSection').classList.remove('hidden');
            
            // Jalankan OCR
            await startOCR(canvas.toDataURL('image/jpeg', 0.8));
        }

        async function startOCR(base64Data) {
            document.getElementById('status').innerText = "Sedang membaca NIK via server...";
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ action: 'ocr', base64Data: base64Data })
                });
                const result = await res.json();
                const text = result.ParsedResults[0].ParsedText;
                const match = text.match(/\d{16}/);
                document.getElementById('fileNameInput').value = match ? match[0] : "";
                document.getElementById('status').innerText = "Selesai.";
            } catch(e) {
                document.getElementById('status').innerText = "Error OCR: " + e.message;
            }
        }

        async function upload() {
            const status = document.getElementById('status');
            const payload = {
                action: 'upload',
                base64Data: document.getElementById('canvas').toDataURL('image/jpeg', 0.9),
                fileName: document.getElementById('kategoriFile').value + " " + document.getElementById('fileNameInput').value + ".jpg",
                selectedRt: document.getElementById('rtSelector').value
            };
            
            status.innerText = "Mengirim ke Drive...";
            await fetch(GAS_URL, {
                method: 'POST',
                mode: 'cors',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            Swal.fire("Berhasil", "Data tersimpan", "success").then(() => window.location.reload());
        }
    </script>
</body>
</html>
