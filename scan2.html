<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<title>Scanner KK RW6</title>
</head>

<body class="bg-gray-100 min-h-screen p-4">

<div class="max-w-md mx-auto bg-white rounded-xl shadow-md p-6">
    <h3 class="text-xl font-bold text-center mb-4">Scanner KK Puri Agung 2</h3>

    <!-- Upload -->
    <div id="uploadSection">
        <label class="block text-center py-8 border-2 border-dashed rounded cursor-pointer">
            Klik ambil foto KK
            <input type="file" accept="image/*" capture="environment" class="hidden" onchange="loadFile(this)">
        </label>
    </div>

    <!-- Editor -->
    <div id="editorSection" class="hidden mt-4">
        <canvas id="canvas" class="w-full border rounded"></canvas>

        <div class="flex gap-2 mt-3">
            <button onclick="rotateImage()" class="bg-gray-600 text-white px-3 py-2 rounded">Putar</button>
            <button onclick="startOCR()" class="bg-yellow-500 text-white px-3 py-2 rounded">Scan OCR</button>
        </div>

        <div class="mt-3">
            <select id="kategoriFile" class="w-full p-2 border rounded">
                <option value="KK BATAM">KK BATAM</option>
                <option value="KK LUAR BATAM">KK LUAR BATAM</option>
            </select>
        </div>

        <div class="mt-3">
            <select id="rtSelector" class="w-full p-2 border rounded">
                <option value="RT 01">RT 01</option>
                <option value="RT 02">RT 02</option>
                <option value="RT 03">RT 03</option>
                <option value="RT 04">RT 04</option>
            </select>
        </div>

        <input id="fileNameInput" class="w-full mt-3 p-2 border rounded" placeholder="Nomor KK">

        <div id="status" class="text-center text-sm mt-3"></div>

        <div class="flex gap-2 mt-4">
            <button id="btnUpload" onclick="upload()" class="flex-1 bg-blue-600 text-white py-2 rounded">Simpan</button>
            <button onclick="location.reload()" class="bg-red-500 text-white px-4 rounded">Reset</button>
        </div>
    </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzXh2wXJYOg5Z-4Q3Kz5iRSm7tPb7RSFgilap1DFBCFOEBXfNwfTYvSnk0XER13xmX2cQ/exec";

let img = new Image();
let rotation = 0;
let originalFile = null;

// LOAD FILE
function loadFile(input){
    if(input.files[0]){
        originalFile = input.files[0];
        const reader = new FileReader();

        reader.onload = e => {
            img.onload = () => {
                drawImage();
                startOCR();
            };
            img.src = e.target.result;
        };

        reader.readAsDataURL(originalFile);
        document.getElementById('uploadSection').classList.add('hidden');
        document.getElementById('editorSection').classList.remove('hidden');
    }
}

// DRAW
function drawImage(){
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    canvas.width = (rotation % 180) ? img.height : img.width;
    canvas.height = (rotation % 180) ? img.width : img.height;

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.rotate(rotation * Math.PI/180);
    ctx.drawImage(img, -img.width/2, -img.height/2);
}

function rotateImage(){
    rotation = (rotation + 90) % 360;
    drawImage();
}

// 🔥 RESIZE + COMPRESS (ANTI ERROR 1MB)
function resizeCanvas(canvas, maxWidth = 1200) {
    const ratio = canvas.width / canvas.height;

    let newWidth = canvas.width;
    let newHeight = canvas.height;

    if (canvas.width > maxWidth) {
        newWidth = maxWidth;
        newHeight = maxWidth / ratio;
    }

    const tempCanvas = document.createElement('canvas');
    const ctx = tempCanvas.getContext('2d');

    tempCanvas.width = newWidth;
    tempCanvas.height = newHeight;

    // optional enhance
    ctx.filter = "grayscale(100%) contrast(140%)";

    ctx.drawImage(canvas, 0, 0, newWidth, newHeight);

    return tempCanvas;
}

// 🔥 EKSTRAK NOMOR KK
function extractKK(text){

    text = text.replace(/O/g, "0").replace(/I/g, "1");

    let match = text.match(/No\.?\s*[:\-]?\s*(\d{16})/i);
    if (match) return match[1];

    match = text.match(/KK\s*[:\-]?\s*(\d{16})/i);
    if (match) return match[1];

    match = text.match(/\b\d{16}\b/);
    if (match) return match[0];

    let numbers = text.match(/\d+/g) || [];
    for (let num of numbers) {
        if (num.length === 16) return num;
    }

    return "";
}

// OCR
async function startOCR(){
    const status = document.getElementById('status');
    const input = document.getElementById('fileNameInput');
    const canvas = document.getElementById('canvas');

    input.value = "";
    status.innerText = "Membaca OCR...";

    try{
        const cropped = cropTopArea(canvas);
        const resizedCanvas = resizeCanvas(cropped, 900);
        const base64Image = resizedCanvas.toDataURL('image/jpeg', 0.5);

        console.log("SIZE KB:", Math.round(base64Image.length / 1024));

        const res = await fetch(GAS_URL,{
            method:'POST',
            headers:{
                "Content-Type":"application/x-www-form-urlencoded"
            },
            body: new URLSearchParams({
                type: "ocr",
                base64: base64Image
            })
        });

        const textResponse = await res.text(); // 🔥 ambil text dulu
        const result = JSON.parse(textResponse); // baru parse

        console.log("FULL OCR RESULT:", result);

        if(result.status !== "success"){
            throw new Error(result.message);
        }

        let parsed = result.data?.ParsedResults;

        if(!parsed || parsed.length === 0){
            status.innerText = "OCR kosong";
            return;
        }

        let text = parsed[0].ParsedText || "";

        console.log("HASIL OCR:", text);

        let nomorKK = extractKK(text);

        input.value = nomorKK;
        status.innerText = nomorKK ? "OCR berhasil" : "Nomor KK tidak ditemukan";

    }catch(err){
        console.error(err);
        status.innerText = "OCR gagal";
    }
}

// UPLOAD
async function upload(){
    const nomorKK = document.getElementById('fileNameInput').value.trim();
    if(!nomorKK){
        Swal.fire("Nomor KK wajib diisi!");
        return;
    }

    const fileName = document.getElementById('kategoriFile').value + " " + nomorKK + ".pdf";
    const rt = document.getElementById('rtSelector').value;

    document.getElementById('btnUpload').disabled = true;
    document.getElementById('status').innerText = "Upload...";

    try{
        await fetch(GAS_URL,{
            method:'POST',
            mode:'no-cors',
            body: new URLSearchParams({
        type: "upload",
        base64Data: document.getElementById('canvas').toDataURL('image/jpeg',0.9),
        fileName: fileName,
        selectedRt: rt
    })
        });

        Swal.fire("Berhasil!", fileName, "success").then(()=>location.reload());

    }catch(e){
        console.error(e);
        Swal.fire("Gagal upload");
        document.getElementById('btnUpload').disabled = false;
    }
}
    function cropTopArea(canvas) {
    const ctx = canvas.getContext('2d');

    const cropHeight = canvas.height * 0.35; // ambil 35% atas

    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = canvas.width;
    tempCanvas.height = cropHeight;

    const tctx = tempCanvas.getContext('2d');
    tctx.drawImage(canvas, 0, 0, canvas.width, cropHeight, 0, 0, canvas.width, cropHeight);

    return tempCanvas;
}
</script>

</body>
</html>
