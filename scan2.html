<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner KK RW6</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 min-h-screen p-4">

    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h3 class="text-xl font-bold text-gray-800 mb-4 text-center">Scanner KK Puri Agung 2</h3>
        
        <div id="uploadSection">
            <label class="block w-full text-center py-8 border-2 border-dashed border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50">
                <span class="text-gray-500">Klik untuk ambil foto KK</span>
                <input type="file" id="fileInput" accept="image/*" capture="environment" class="hidden" onchange="loadFile(this)">
            </label>
        </div>

        <div id="editorSection" class="hidden mt-4">
            <div class="img-container mb-4 border rounded overflow-hidden">
                <img id="imagePreview" src="" alt="Preview">
            </div>
            
            <div class="flex justify-center gap-2 mt-4 editor-controls">
                <button onclick="rotateImageEditor(-90)">↺ Putar L</button>
                <button onclick="rotateImageEditor(90)">↻ Putar R</button>
                <button onclick="zoomImage(0.1)">＋</button>
                <button onclick="zoomImage(-0.1)">－</button>
            </div>
            
            <div class="flex gap-2 mt-4">
                <button onclick="resetForm()" class="flex-1 bg-red-500 text-white py-2 rounded shadow">Batal</button>
                <button onclick="applyCrop()" class="flex-1 bg-blue-600 text-white py-2 rounded shadow">Potong & Lanjut</button>
            </div>
        </div>

        <div id="finalSection" class="hidden mt-4">
            <canvas id="canvas" class="w-full rounded border mb-4"></canvas>
            
            <div class="flex justify-center gap-2">
                <button onclick="startOCR()" class="bg-yellow-500 text-white px-4 py-2 rounded shadow text-sm">Scan Ulang (OCR)</button>
                <button onclick="backToEditor()" class="bg-gray-600 text-white px-4 py-2 rounded shadow text-sm">Edit Ulang</button>
            </div>
            
            <div class="mt-4 space-y-3">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Kategori:</label>
                    <select id="kategoriFile" class="w-full mt-1 p-2 border rounded-md">
                        <option value="KK BATAM">KK BATAM</option>
                        <option value="KK LUAR BATAM">KK LUAR BATAM</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">RT:</label>
                    <select id="rtSelector" class="w-full mt-1 p-2 border rounded-md">
                        <option value="RT 01">RT 01</option>
                        <option value="RT 02">RT 02</option>
                        <option value="RT 03">RT 03</option>
                        <option value="RT 04">RT 04</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Nomor KK (Verifikasi):</label>
                    <input type="text" id="fileNameInput" class="w-full mt-1 p-2 border rounded-md">
                </div>
            </div>

            <div id="status" class="mt-4 text-center text-sm text-gray-600 font-medium"></div>

            <div class="flex gap-2 mt-4">
                <button id="btn" onclick="upload()" class="flex-1 bg-green-600 text-white py-2 rounded shadow">Simpan ke Drive</button>
                <button onclick="resetForm()" class="bg-red-500 text-white py-2 px-4 rounded shadow">Reset</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    
    <script>
        // URL WEB APP ANDA
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyS4SondgG4nv2_80mFW5GvkkiwxV5ySmcByB3L2Yj2eOMJkS1I0u8hkBwP76WG5tlwlQ/exec";

        let cropper = null; // Variabel state untuk Cropper.js
        let originalFile = null;

        // FUNGSI RESET UNTUK MEMBERSIHKAN FORM
        function resetForm() {
            document.getElementById('uploadSection').classList.remove('hidden');
            document.getElementById('editorSection').classList.add('hidden');
            document.getElementById('finalSection').classList.add('hidden');
            
            document.getElementById('fileInput').value = "";
            document.getElementById('fileNameInput').value = "";
            document.getElementById('status').innerText = "";
            document.getElementById('btn').disabled = false;
            
            // Hancurkan instance cropper jika ada
            if (cropper) {
                cropper.destroy();
                cropper = null;
            }
            
            // Reset canvas
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            originalFile = null;
        }

        // MEMUAT FILE DAN MASUK KE MODE EDITOR (CROP)
        function loadFile(input) {
            if (input.files && input.files[0]) {
                originalFile = input.files[0];
                const reader = new FileReader();
                
                reader.onload = (e) => {
                    const imagePreview = document.getElementById('imagePreview');
                    imagePreview.src = e.target.result;
                    
                    document.getElementById('uploadSection').classList.add('hidden');
                    document.getElementById('editorSection').classList.remove('hidden');
                    
                    // Inisialisasi Cropper.js
                    if (cropper) cropper.destroy(); // Bersihkan yang lama
                    
                    cropper = new Cropper(imagePreview, {
                        aspectRatio: NaN, // Bebas memotong (tidak dikunci rasio A4 dulu)
                        viewMode: 1, // Membatasi crop box di dalam gambar
                        autoCropArea: 0.8, // Otomatis buat kotak crop 80% area
                        responsive: true,
                        restore: false,
                        checkOrientation: false, // Matikan auto-rotate EXIF agar kontrol kita akurat
                    });
                };
                reader.readAsDataURL(originalFile);
            }
        }

        // KONTROL EDITOR
        function rotateImageEditor(degree) { if (cropper) cropper.rotate(degree); }
        function zoomImage(ratio) { if (cropper) cropper.zoom(ratio); }

 // MENERAPKAN CROP, MENAMBAHKAN WATERMARK, DAN LANJUT KE VERIFIKASI
         function applyCrop() {
            if (!cropper) return;
            
            // 1. Ambil hasil crop dalam bentuk canvas
            const croppedCanvas = cropper.getCroppedCanvas({
                imageSmoothingEnabled: true,
                imageSmoothingQuality: 'high',
            });
            
            // 2. Siapkan canvas final
            const finalCanvas = document.getElementById('canvas');
            const ctx = finalCanvas.getContext('2d');
            finalCanvas.width = croppedCanvas.width;
            finalCanvas.height = croppedCanvas.height;
            
            // 3. Gambar hasil crop ke canvas final
            ctx.drawImage(croppedCanvas, 0, 0);
            
            // --- MULAI LOGIKA WATERMARK HIJAU STABILO ---
            
            const text = "PURI AGUNG 2 RW 06";
            
            // Dinamiskan ukuran font berdasarkan lebar gambar (misal 5% dari lebar)
            const fontSize = Math.max(finalCanvas.width * 0.05, 20); 
            ctx.font = `bold ${fontSize}px Arial`; // Tulisan Tebal
            
            // --- PERUBAHAN WARNA DISINI ---
            // Menggunakan warna Hijau Stabilo/Neon (RGBA)
            // 57, 255, 20 = Hijau Neon
            // 0.2 = Opacity 20% (samar-samar tapi terlihat)
            ctx.fillStyle = "rgba(57, 255, 20, 0.2)"; 
            // ---------------------------------
            
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            // Tentukan posisi (tengah kanvas)
            const x = finalCanvas.width / 2;
            const y = finalCanvas.height / 2;
            
            // Gambar teks di tengah
            ctx.fillText(text, x, y);

            // --- SELESAI LOGIKA WATERMARK ---
            
            // 4. Pindah Tampilan
            document.getElementById('editorSection').classList.add('hidden');
            document.getElementById('finalSection').classList.remove('hidden');
            
            // 5. Jalankan OCR pada file asli
            startOCR();
        }

        function backToEditor() {
            document.getElementById('finalSection').classList.add('hidden');
            document.getElementById('editorSection').classList.remove('hidden');
        }

    async function startOCR() {
    document.getElementById('fileNameInput').value = ""; 
    document.getElementById('status').innerText = "TUNGGU SEDANG BACA NO KK...";
    
    // Konversi canvas ke blob
    const canvas = document.getElementById('canvas');
    canvas.toBlob(async (blob) => {
        const formData = new FormData();
        formData.append('file', blob, 'kk.jpg');
        formData.append('apikey', 'K83502824388957'); 
        formData.append('OCREngine', '3');            
        formData.append('language', 'auto');          // Menggunakan auto-detect
        
        try {
            const response = await fetch('https://api.ocr.space/parse/image', {
                method: 'POST',
                body: formData
            });

            const result = await response.json();

            if (result.IsErroredOnProcessing) {
                throw new Error(result.ErrorMessage[0]);
            }

            // Menggabungkan teks dari semua baris hasil OCR
            const parsedResults = result.ParsedResults;
            let text = "";
            if (parsedResults && parsedResults.length > 0) {
                text = parsedResults[0].ParsedText;
            }
            
            // Regex mencari 16 digit angka (Nik/No KK)
            const match = text.match(/\d{16}/);
            document.getElementById('fileNameInput').value = match ? match[0] : "";
            document.getElementById('status').innerText = "Pembacaan selesai. Periksa kembali nomor KK..";
            
        } catch (err) {
            console.error(err);
            document.getElementById('status').innerText = "GAGAL BACA NO KK, SCAN ULANG: " + err.message;
        }
    }, 'image/jpeg', 0.9);
}

        async function upload() {
            const status = document.getElementById('status');
            const kategori = document.getElementById('kategoriFile').value; 
            const rt = document.getElementById('rtSelector').value; 
            const nomorKK = document.getElementById('fileNameInput').value.trim();
            
            if(!nomorKK) {
                Swal.fire({ icon: 'warning', title: 'Oops!', text: 'Nomor KK wajib diisi!' });
                return;
            }

            const fileName = kategori + " " + nomorKK + ".pdf";
            document.getElementById('btn').disabled = true;
            status.innerText = "Mengunggah...";

            try {
                // Ambil data gambar dari canvas final (hasil crop)
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        base64Data: document.getElementById('canvas').toDataURL('image/jpeg', 0.9),
                        fileName: fileName,
                        selectedRt: rt
                    })
                });
                
                Swal.fire({ 
                    icon: 'success', 
                    title: 'Berhasil!', 
                    text: fileName + ' telah tersimpan.' 
                }).then(() => {
                    resetForm();
                });
                
            } catch (err) {
                console.error(err);
                Swal.fire({ icon: 'error', title: 'Gagal', text: 'Terjadi kesalahan jaringan.' });
                document.getElementById('btn').disabled = false;
            }
        }
    </script>
</body>
</html>
