<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner KK Puri Agung 2</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

    <style>
        :root {
            --primary-color: #007bff;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h3 { text-align: center; color: var(--primary-color); margin-top: 0; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        select, input[type="text"], input[type="file"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        
        /* Area Preview/Cropper */
        .preview-container { width: 100%; max-height: 300px; margin-bottom: 15px; border-radius: 8px; overflow: hidden; display: none; border: 2px dashed #ddd; background: #fafafa;}
        img#image-preview { max-width: 100%; display: block; }
        
        /* Tombol Kontrol Cropper */
        .cropper-controls { display: flex; gap: 10px; margin-bottom: 15px; display: none; }
        .btn-control { flex: 1; padding: 10px; background: #6c757d; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 12px;}
        .btn-control:hover { background: #5a6268; }

        /* Tombol Utama */
        button.btn-main { width: 100%; padding: 15px; background: var(--primary-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: background 0.3s; }
        button.btn-main:hover { background: #0056b3; }
        button.btn-main:disabled { background: #ccc; cursor: not-allowed; }

        /* Hasil OCR */
        #ocr-area { display: none; background: #e9ecef; padding: 15px; border-radius: 8px; margin-top: 15px; border-left: 5px solid var(--primary-color); }

        .loader { display: none; text-align: center; margin-top: 10px; font-size: 14px; color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h3>Scanner KK Puri Agung</h3>
    
    <div class="form-group">
        <label>1. Ambil/Upload Foto KK</label>
        <input type="file" id="file-input" accept="image/*" capture="environment">
    </div>

    <div class="preview-container" id="preview-container">
        <img id="image-preview" src="">
    </div>
    <div class="cropper-controls" id="cropper-controls">
        <button class="btn-control" onclick="rotateImage(-90)">↺ Rotate Kiri</button>
        <button class="btn-control" onclick="rotateImage(90)">↻ Rotate Kanan</button>
    </div>

    <div class="form-group">
        <label>2. Kategori Dokumen</label>
        <select id="category-select">
            <option value="KK BATAM">KK BATAM</option>
            <option value="KK LUAR BATAM">KK LUAR BATAM</option>
        </select>
    </div>

    <div class="form-group">
        <label>3. Pilih Folder RT</label>
        <select id="rt-select">
            <option value="RT 01">RT 01</option>
            <option value="RT 02">RT 02</option>
            <option value="RT 03">RT 03</option>
            <option value="RT 04">RT 04</option>
        </select>
    </div>

    <button class="btn-main" id="btn-scan" onclick="processOCR()">Langkah Berikutnya: Scan OCR</button>

    <div id="ocr-area">
        <div class="form-group">
            <label>Hasil Nomor KK (Silahkan edit jika salah)</label>
            <input type="text" id="kk-number-input" maxlength="16" placeholder="16 digit nomor KK">
        </div>
        <button class="btn-main" style="background: #28a745;" id="btn-upload" onclick="generatePdfAndUpload()">Final: Kirim ke Google Drive</button>
    </div>

    <div class="loader" id="loader">Diproses... Mohon tunggu.</div>
</div>

<script>
    // --- KONFIGURASI ---
    const OCR_API_KEY = "K83502824388957"; // API Key Anda
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzFxO1x7e5ou8yGSDdyhwnv8L3qzAeeM-P7mOQ3_qsj7jz8UoX9L_Ch6k2oS3G1n6gzuw/exec"; // GANTI INI!

    let cropper = null;
    const fileInput = document.getElementById('file-input');
    const imagePreview = document.getElementById('image-preview');
    const previewContainer = document.getElementById('preview-container');
    const cropperControls = document.getElementById('cropper-controls');
    const ocrArea = document.getElementById('ocr-area');
    const btnScan = document.getElementById('btn-scan');
    const kkInput = document.getElementById('kk-number-input');
    const loader = document.getElementById('loader');

    // --- LOGIKA 1: PREVIEW & INITIALIZE CROPPER ---
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            imagePreview.src = event.target.result;
            
            // Tampilkan container
            previewContainer.style.display = 'block';
            cropperControls.style.display = 'flex';
            ocrArea.style.display = 'none'; // Sembunyikan area OCR jika ganti foto
            btnScan.disabled = false;

            // Hancurkan cropper lama jika ada
            if (cropper) {
                cropper.destroy();
            }

            // Inisialisasi Cropper.js
            cropper = new Cropper(imagePreview, {
                viewMode: 1, // Drag mode: move canvas
                movable: true,
                rotatable: true,
                scalable: true,
                zoomable: true,
                autoCropArea: 1, // Otomatis seleksi seluruh gambar di awal
                background: false,
            });
        };
        reader.readAsDataURL(file);
    });

    // Fungsi Rotate
    function rotateImage(deg) {
        if (cropper) {
            cropper.rotate(deg);
        }
    }

    // --- LOGIKA 2: CROP, COMPRESS, & SCAN OCR ---
    async function processOCR() {
    if (!cropper) return alert("Pilih foto terlebih dahulu!");
    showLoader(true);

    // Ambil base64 dari cropper
    const croppedBase64 = cropper.getCroppedCanvas({maxWidth: 1000}).toDataURL('image/jpeg', 0.7).split(',')[1];

    try {
        const response = await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            body: JSON.stringify({ 
                action: "ocr", 
                file: croppedBase64 
            })
        });
        
        const result = await response.json();
        const scannedText = result.ParsedResults[0].ParsedText;
        const match = scannedText.match(/\d{16}/);
        
        kkInput.value = match ? match[0] : "";
        ocrArea.style.display = 'block';
    } catch (error) {
        alert("Gagal memproses OCR via Proxy.");
    } finally {
        showLoader(false);
    }
}

function extractKK(text) {
    // 1. Bersihkan teks: hapus spasi berlebih, baris baru, dll agar mudah dicari
    const cleanText = text.replace(/\s+/g, ' '); 

    // 2. Gunakan Regex yang mencari kata "No." (bisa dengan atau tanpa titik)
    // lalu mencari angka 16 digit yang berada tepat setelahnya.
    // Pola: No diikuti titik/spasi, lalu angka 16 digit
    const regex = /No\.?\s*[:.]?\s*(\d{16})/i;
    
    const match = cleanText.match(regex);
    
    if (match && match[1]) {
        console.log("Nomor KK berhasil ditemukan dengan pola No.:", match[1]);
        return match[1];
    }

    // 3. Fallback: jika tetap tidak ketemu, cari angka 16 digit yang muncul pertama kali
    // (Ini sebagai cadangan jika OCR benar-benar tidak membaca tulisan "No.")
    const fallback = cleanText.match(/\d{16}/);
    return fallback ? fallback[0] : "";
}

const kkNumber = extractKK(scannedText);
kkInput.value = kkNumber || "";
if (!kkNumber) {
    alert("Nomor KK tidak terdeteksi otomatis. Silahkan input manual.");
}

    // --- LOGIKA 3: GENERATE PDF (DENGAN FOTO CROP) + WATERMARK + UPLOAD ---
    async function generatePdfAndUpload() {
        const noKk = kkInput.value.trim();
        const kategori = document.getElementById('category-select').value;
        const rt = document.getElementById('rt-select').value;

        // Validasi
        if (noKk.length !== 16 || isNaN(noKk)) {
            return alert("Nomor KK wajib 16 digit angka!");
        }

        if (GAS_WEB_APP_URL === "URL_WEB_APP_APPS_SCRIPT_ANDA_DISINI") {
            return alert("Anda belum menyetting URL Google Apps Script di dalam kode HTML.");
        }

        showLoader(true);
        document.getElementById('btn-upload').disabled = true;

        try {
            // 1. Ambil data gambar yang di-crop (Base64) untuk dimasukkan ke PDF
            const croppedBase64 = cropper.getCroppedCanvas().toDataURL('image/jpeg', 0.85);

            // 2. Buat PDF Dokumen
            const pdfDoc = await PDFLib.PDFDocument.create();
            
            // KK biasanya landscape, kita buat halaman A4 Landscape
            const page = pdfDoc.addPage([841.89, 595.28]); // A4 Landscape dalam points
            const { width, height } = page.getSize();

            // 3. Masukkan Gambar KK ke PDF (Memenuhi halaman)
            const jpgImage = await pdfDoc.embedJpg(croppedBase64);
            page.drawImage(jpgImage, {
                x: 0,
                y: 0,
                width: width,
                height: height,
            });

            // 4. Tambah Watermark
            // Kita taruh di kiri bawah, transparan
            page.drawText('PURI AGUNG 2 RW 6', {
                x: 30,
                y: 30,
                size: 20,
                color: PDFLib.rgb(0, 0, 0), // Hitam
                opacity: 0.35, // Transparan (35%)
            });

            // 5. Simpan PDF ke Base64
            const pdfBase64 = await pdfDoc.saveAsBase64();

            // 6. Nama File Otomatis
            const fileName = `${kategori} ${noKk}.pdf`;

            // 7. Kirim ke Google Apps Script
            const response = await fetch(GAS_WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors', // Penting agar tidak error CORS di GAS
                body: JSON.stringify({
                    file: pdfBase64,
                    fileName: fileName,
                    rt: rt
                })
            });

            // Karena mode 'no-cors', kita tidak bisa membaca response json, 
            // tapi jika tidak error catch, diasumsikan berhasil.
            alert(`Berhasil! File "${fileName}" sedang diupload ke folder ${rt}. Silahkan cek Drive.`);
            location.reload(); // Reload halaman untuk reset

        } catch (error) {
            console.error(error);
            alert("Terjadi kesalahan saat membuat PDF atau mengupload. Pastikan URL GAS benar.");
        } finally {
            showLoader(false);
            document.getElementById('btn-upload').disabled = false;
        }
    }

    function showLoader(show) {
        loader.style.display = show ? 'block' : 'none';
    }
</script>

</body>
</html>
