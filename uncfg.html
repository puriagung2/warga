<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONU Uncfg Dashboard</title>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #eef2f3; padding: 20px; color: #333; }
        .card { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #666; }
        input { width: 100%; padding: 12px; border: 1.5px solid #dde; border-radius: 8px; font-size: 14px; transition: 0.3s; box-sizing: border-box;}
        input:focus { border-color: #007bff; outline: none; box-shadow: 0 0 0 3px rgba(0,123,255,0.1); }
        button { background: #007bff; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 15px; }
        button:hover { background: #0056b3; }
        #status { margin-top: 15px; font-size: 14px; font-weight: bold; }
        pre { background: #1e1e1e; color: #d4d4d4; padding: 20px; border-radius: 8px; overflow-x: auto; font-size: 13px; line-height: 1.5; border-left: 5px solid #007bff; }
        .error { color: #dc3545; }
        .success { color: #28a745; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0">🔍 ONU Unconfigured Finder</h2>
    <p style="color: #888; font-size: 14px;">Masukkan parameter OLT dan PON untuk scanning.</p>
    
    <div class="grid">
        <div>
            <label>OLT ID</label>
            <input type="text" id="olt" value="66d558cb6c00f5a737817f4d">
        </div>
        <div>
            <label>PON Port</label>
            <input type="number" id="pon" value="15">
        </div>
    </div>

    <button onclick="runCheck()">Cek Sekarang</button>

    <div id="status"></div>
    <pre id="output">Output API akan muncul di sini...</pre>
</div>

<script>
async function runCheck() {
    const btn = document.querySelector('button');
    const out = document.getElementById('output');
    const stat = document.getElementById('status');
    
    const olt = document.getElementById('olt').value;
    const pon = document.getElementById('pon').value;

    // Tambahkan prefix proxy di depan URL asli
    const proxyUrl = "https://cors-anywhere.herokuapp.com/";
    const targetUrl = `https://api.kejora.net/olt/onu/uncfg?olt=${olt}&pon=${pon}`;

    const CONFIG = {
        token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjY2YzhlODViNDFmZjVhODlmNTdjODRkNiIsImlhdCI6MTc1NjA5MzEwMCwiZXhwIjoyMDcxNjY5MTAwLCJhdWQiOiJBcHBzIEtlam9yYU5ldCIsImlzcyI6IlNTTyBLZWpvcmFOZXQiLCJzdWIiOiJLZWpvcmFOZXQiLCJqdGkiOiJlN2E2Mzg5Yi05MmMxLTQ1OTktYjA5NC0wZjgzN2NkYWFlMzEifQ.xn-M44R8LLqNJwTw-wPpQNPXrIdPLRHTkqVXnRSkKbA",
        sig: "1f0c754c49b4c411c9e10e04daa3891160ebfb923eb86e4a5ae114214d31ffb7",
        ts: "1727247498"
    };

    btn.disabled = true;
    stat.innerText = "⏳ Menghubungi Proxy...";

    try {
        const response = await fetch(proxyUrl + targetUrl, {
            method: 'GET',
            headers: {
                'Authorization': `Bearer ${CONFIG.token}`,
                'X-Signature': CONFIG.sig,
                'X-Timestamp': CONFIG.ts,
                'Content-Type': 'application/json',
                'X-Requested-With': 'XMLHttpRequest' // Dibutuhkan oleh beberapa proxy
            }
        });

        if (!response.ok) {
            // Jika proxy minta aktivasi, tampilkan linknya
            if(response.status === 403) {
                out.innerHTML = "Klik link ini dulu untuk mengaktifkan akses proxy sementara:<br><a href='https://cors-anywhere.herokuapp.com/corsdemo' target='_blank'>https://cors-anywhere.herokuapp.com/corsdemo</a><br>Lalu klik tombol Cek lagi.";
                return;
            }
            throw new Error(`Server API Error: ${response.status}`);
        }

        const data = await response.json();
        stat.className = "success";
        stat.innerText = "✅ Berhasil!";
        out.innerText = JSON.stringify(data, null, 4);

    } catch (err) {
        stat.className = "error";
        stat.innerText = "❌ Gagal: " + err.message;
        out.innerText = "Detail Error: " + err.stack;
    } finally {
        btn.disabled = false;
    }
}
</script>

</body>
</html>
